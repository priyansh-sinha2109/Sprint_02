<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="Cash-flow.css" />
  </head>
  <body>
    <h2>Cash-Flow</h2>
    <div class="container">
      <h4>Remaining Balance</h4>
      <h1 id="balance">₹0.00</h1>
      <div class="inc-exp-container">
        <div>
          <h4>Salary</h4>
          <p id="money-plus" class="money-plus">+₹0.00</p>
        </div>
        <div>
          <h4>Total Expense</h4>
          <p id="money-minus" class="money-minus">-₹0.00</p>
        </div>
      </div>

      <div class="chart-container">
        <canvas id="expenseChart"></canvas>
      </div>

      <h3>History</h3>
      <ul id="list" class="list"></ul>

      <!--Salary Form-->
      <form id="salary-form">
        <div class="salary-form-control">
          <label>Total Salary</label>
          <input
            type="number"
            id="salary-input"
            required
            placeholder="Enter Salary"
          />
          <button class="btn">Set Salary</button>
        </div>
      </form>

      <!--Expense Add form-->
      <h3>Add New Expense</h3>
      <form id="form">
        <!--Expense Name Add text-->
        <div class="form-control">
          <label for="text">Expense Name</label>
          <input type="text" id="text" placeholder="Enter Expense Name...." />
        </div>
        <!--Expense Amount Add text-->
        <div class="form-control">
          <label for="amount"
            >Expense Amount <br />
            (negative - expense ,positive - income )</label
          >
          <input
            type="number"
            id="amount"
            placeholder="Enter Expense amount..."
          />
        </div>
        <!--New Expense Add button-->
        <button class="btn">Add Expense</button>
      </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="Cash-flow.js"></script>
  </body>
</html>
